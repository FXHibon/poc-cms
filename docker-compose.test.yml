version: '3.8'

services:
  # The application being tested
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgres://test_user:test_password@db:5432/test_db
      - JWT_SECRET=novacms-test-key-0987654321
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    # Mount tests directory to run integration tests against the runner image
    volumes:
      - ./tests:/usr/src/app/tests
    # First run the database initialization script, then execute test suite
    command: sh -c "npm run init-db && npm test"

  # PostgreSQL database dependency
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=test_user
      - POSTGRES_PASSWORD=test_password
      - POSTGRES_DB=test_db
    ports:
      - "5433:5432" # Exposed to host on 5433 for debugging if needed (avoids conflict with local dev pg)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgtestdata:/var/lib/postgresql

volumes:
  pgtestdata:
