<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | NovaCMS</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="admin.css">
  <script>
    (function() {
      const theme = localStorage.getItem('site-theme') || 
                    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 50% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 20px 20px 0 0;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .login-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">NovaCMS</div>
        <div class="login-subtitle">Administrator Console</div>
      </div>
      
      <div id="errorMessage" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username" placeholder="e.g. admin">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">
          Log In
        </button>
      </form>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">← Back to website</a>
      </div>
    </div>
  </div>

  <script>
    // Simple authentication script for login.html
    document.addEventListener("DOMContentLoaded", async () => {
      // If already logged in, redirect to index.html
      try {
        const res = await fetch("/api/auth/status");
        const data = await res.json();
        if (data.loggedIn) {
          window.location.href = "/admin/index.html";
        }
      } catch (err) {
        console.error("Failed check login status", err);
      }

      const form = document.getElementById("loginForm");
      const errBox = document.getElementById("errorMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errBox.style.display = "none";
        
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();
          if (response.ok) {
            window.location.href = "/admin/index.html";
          } else {
            errBox.textContent = data.error || "Login failed. Check credentials.";
            errBox.style.display = "block";
          }
        } catch (err) {
          errBox.textContent = "Network error. Make sure server is running.";
          errBox.style.display = "block";
        }
      });
    });
  </script>
</body>
</html>
